{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <div class="glass-card p-5 mx-auto" style="max-width:480px;">
    <i class="bi bi-tools" style="font-size:3rem;color:var(--primary);"></i>
    <h2 class="mt-3">500 — Something Went Wrong</h2>
    <p class="text-secondary">Our team has been notified. Please try again shortly.</p>
    <a href="{{ url_for('public.home') }}" class="btn btn-brand mt-2">Go Home</a>
  </div>
</div>
{% endblock %}
