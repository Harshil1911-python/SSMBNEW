{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <div class="glass-card p-5 mx-auto" style="max-width:480px;">
    <i class="bi bi-emoji-frown" style="font-size:3rem;color:var(--primary);"></i>
    <h2 class="mt-3">404 — Page Not Found</h2>
    <p class="text-secondary">The page you're looking for doesn't exist or was moved.</p>
    <a href="{{ url_for('public.home') }}" class="btn btn-brand mt-2">Go Home</a>
  </div>
</div>
{% endblock %}
